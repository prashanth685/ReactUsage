<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      h2 {
        /* background-color: rgba(255, 0, 0, 0.2); */
        /* background-color: hsl(120, 80%, 20%); */
        background-color: #229826;
        color: #fff;
        border: 1px dashed #9090;
        text-align: center;
        text-transform: capitalize;
        font-family: Georgia, "Times New Roman", Times, serif;
        margin: 12px 2px 0px 12px;
        text-decoration: underline;
        text-shadow: 2px 4px rgba(0, 0, 0, 0.1);
      }
      .main {
        background-image: url("https://images.unsplash.com/photo-1774413768903-057eb084133b?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwxNHx8fGVufDB8fHx8fA%3D%3D");
        /* background-position: bottom left; */
        /* background-size: cover; */
        background-repeat: repeat;
        border: 2px solid;
        width: 100%;
        height: 300px;
        position: relative;
      }

      .main:hover {
        content: "Tutorial point";
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <h2>Hello world!</h2>
    <div class="main"></div>
  </body>
</html>
