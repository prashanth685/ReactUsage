<!doctype html>
<html lang="en">
  <head>
    <style>
      img {
        width: 200px;
        height: 200px;
      }
      .overlay-container {
        position: relative;
        width: 25%;
      }
      .overlay-container:hover .fade-effect {
        opacity: 0.9;
        height: 200px;
      }
      .fade-effect {
        position: absolute;
        transition: 0.9s ease;
        opacity: 0;
        width: 200px;
        height: 200px;
        border-radius: 5px;
        top: 0;
        background-color: #d346e6;
        text-align: center;
        color: #ffffff;
      }
      h2 {
        text-align: center;
      }
    </style>
  </head>

  <body>
    <h2>Hover your cursor over the image.</h2>

    <div class="overlay-container">
      <img src="/css/images/tutimg.png" />
      <div class="fade-effect">
        <h2>Fade Overlay Effect</h2>
      </div>
    </div>
  </body>
</html>
